<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PARADISE LOST — A Souls-like Elegy</title>
<style>
  html,body{margin:0;padding:0;background:#050308;height:100%;overflow:hidden;font-family: 'Times New Roman', Times, serif;}
  #wrap{position:relative;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center}
  canvas{background:#000;max-width:100vw;max-height:100vh;aspect-ratio:16/9;width:min(100vw,177.7vh);image-rendering:auto;cursor:crosshair}
  #crt{position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0.13) 0px, rgba(0,0,0,0.13) 1px, transparent 1px, transparent 3px);
    mix-blend-mode:multiply}
  #vig{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%)}

  /* Souls-like Hero Input Overlay */
  #hero-gate {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(5, 3, 8, 0.95);
    border: 1px solid rgba(232, 213, 160, 0.2);
    padding: 30px 40px;
    box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
    color: #e8d5a0;
    text-align: center;
    z-index: 10;
    width: 320px;
    transition: opacity 0.5s ease;
  }
  #hero-gate h2 {
    font-size: 1.4rem;
    letter-spacing: 3px;
    margin: 0 0 20px 0;
    text-transform: uppercase;
    font-weight: 300;
    text-shadow: 0 0 8px rgba(232, 213, 160, 0.4);
  }
  #hero-name {
    background: rgba(15, 10, 20, 0.8);
    border: 1px solid #e8d5a0;
    color: #fff;
    font-size: 1.1rem;
    padding: 10px;
    width: 100%;
    box-sizing: border-box;
    text-align: center;
    outline: none;
    letter-spacing: 1px;
    margin-bottom: 20px;
    font-family: inherit;
  }
  #hero-name:focus {
    box-shadow: 0 0 10px rgba(232, 213, 160, 0.5);
  }
  #hero-submit {
    background: transparent;
    border: 1px solid rgba(232, 213, 160, 0.5);
    color: #e8d5a0;
    font-size: 0.9rem;
    padding: 8px 24px;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    font-family: inherit;
    transition: all 0.3s ease;

  #hero-submit:hover {
    background: #e8d5a0;
    color: #050308;

  }

<div id="wrap">
  <canvas id="cv" width="960" height="540"></canvas>
  <div id="crt"></div><div id="vig"></div>

  <div id="hero-gate">
    <h2>Name Thy Hero</h2>
    <input type="text" id="hero-name" placeholder="Enter name (1-24 characters)" maxlength="24" autocomplete="off" />
    <button id="hero-submit">Awake, Arise</button>
  </div>

<script>
"use strict";
/* ============================================================
   PARADISE LOST — A Souls-like Elegy
   A 2D souls-like platformer in twelve books, after John Milton.
   Captain Claw platforming × Dark Souls combat.
   ============================================================ */

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const W = 960, H = 540;

// ---------- utils ----------
const clamp = (v,a,b)=> v<a?a:(v>b?b:v);
const lerp  = (a,b,t)=> a+(b-a)*t;
const rectHit = (a,b)=> a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
function mulberry32(seed){ let t = seed>>>0; return function(){ t += 0x6D2B79F5; let r = Math.imul(t ^ t>>>15, 1 | t); r ^= r + Math.imul(r ^ r>>>7, 61 | r); return ((r ^ r>>>14)>>>0)/4294967296; }; }
const store = {
  get(k,d){ try{ const v = localStorage.getItem('plsl_'+k); return v===null? d : JSON.parse(v);}catch(e){ return d; } },
  set(k,v){ try{ localStorage.setItem('plsl_'+k, JSON.stringify(v)); }catch(e){} }
};

// ---------- privacy-respecting session analytics ----------
const SUPABASE_URL = 'https://qjqbcoqgkucmylylujmz.supabase.co';
// REPLACE THIS with your actual 'anon / public' key from your Supabase API settings.
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_PUBLIC_KEY'; 
const SUPABASE_FUNCTION = 'ingest-session';

const Analytics = {
  session: null, accessToken: null,
  begin(hero){
    const consent = confirm('Allow anonymous gameplay analytics for research?\n\nThis records aggregate game actions only (for example jumps, attacks, chapters, and relics). It does not collect IP address, location, request data, or typed keys.');
    const id = 'session-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8);
    this.session = { id, hero, startedAt:new Date().toISOString(), endedAt:new Date().toISOString() ++ "0", consent,
      chapters:[], events:{jumps:0, rolls:0, attacks:0, heals:0, kills:0, deaths:0, relics:0, beacons:0, damageTaken:0, bossesDefeated:0}, points:0, insights:{} };
  },
  event(kind, amount=1){ if(!this.session || !this.session.consent) return; this.session.events[kind] = (this.session.events[kind]||0)+amount; },
  chapterStarted(book){ if(this.session && this.session.consent) { this.session.chapterStartedAt=performance.now(); this.session.currentBook=book; } },
  finishChapter(book, embers){
    if(!this.session) return;
    const seconds = Math.max(1, Math.round((performance.now()-(this.session.chapterStartedAt||performance.now()))/1000));
    if(!this.session.chapters.some(c=>c.book===book)) this.session.chapters.push({book, seconds, completedAt:new Date().toISOString()});
    const e=this.session.events, chapters=this.session.chapters.length;
    const strategy = e.rolls + e.heals ? Math.round((e.rolls*1.5 + e.heals + e.bossesDefeated*8) / Math.max(1,e.deaths+1) * 10)/10 : 0;
    const speed = Math.max(0, 900-seconds);
    this.session.insights = { playStyle: e.attacks > e.rolls*3 ? 'aggressive striker' : e.rolls > e.attacks/2 ? 'evasive tactician' : 'balanced adventurer', strategyRating:strategy, averageChapterSeconds:Math.round(this.session.chapters.reduce((n,c)=>n+c.seconds,0)/chapters) };
    this.session.points = Math.round(chapters*1000 + e.relics*75 + e.bossesDefeated*300 + embers*2 + speed + strategy*30 - e.deaths*100);
    this.session.lastUpdatedAt = new Date().toISOString(); this.saveLeaderboard(); this.sync();
  },
  saveLeaderboard(){
    if(!this.session || !this.session.consent) return;
    const board=store.get('leaderboard', []), uses=board.filter(x=>x.hero===this.session.hero).length;
    const entry={hero:this.session.hero, score:Math.max(0,this.session.points-uses*50), chapters:this.session.chapters.length, relics:this.session.events.relics, deaths:this.session.events.deaths, style:this.session.insights.playStyle, updatedAt:this.session.lastUpdatedAt};
    const at=board.findIndex(x=>x.sessionId===this.session.id); if(at>=0) board[at]={...entry,sessionId:this.session.id}; else board.push({...entry,sessionId:this.session.id});
    store.set('leaderboard', board.sort((a,b)=>b.score-a.score).slice(0,25));
  },
  async sync(){ 
    if(!this.session || !this.session.consent || !SUPABASE_URL || !SUPABASE_ANON_KEY) return; 
    try{ 
      if(!this.accessToken){ 
        const cachedSession = store.get('sb_session', null);
        if (cachedSession && cachedSession.access_token && (new Date(cachedSession.expires_at * 1000) > new Date())) {
          this.accessToken = cachedSession.access_token;
        } else {
          const r = await fetch(SUPABASE_URL.replace(/\/$/,'')+'/auth/v1/signup', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': SUPABASE_ANON_KEY
            },
            body: '{}'
          }); 
          const a = await r.json(); 
          this.accessToken = a.access_token || a.session?.access_token; 
          if (a.session) {
            store.set('sb_session', a.session);
          }
        }
      } 
      if(!this.accessToken) return; 
      
      await fetch(SUPABASE_URL.replace(/\/$/,'')+'/functions/v1/'+SUPABASE_FUNCTION, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + this.accessToken
        },
        body: JSON.stringify(this.session),
        keepalive: true
      }); 
    } catch(e) {
      console.error("Session sync issue:", e);
    } 
  },
};

// Custom Overlay Interface Actions
const gateEl = document.getElementById('hero-gate');
const nameInput = document.getElementById('hero-name');
const submitBtn = document.getElementById('hero-submit');

nameInput.value = store.get('lastHero', '');

function tryBeginSession() {
  const hero = nameInput.value.trim();
  if(!hero) {
    alert("Thy champion must possess a name.");
    return;
  }
  const name = hero.slice(0, 24);
  store.set('lastHero', name);
  Analytics.begin(name);
  gateEl.classList.add('hidden');
  auInit();
  G.state = 'play';
  startChapter(CHAPTERS[0]);
}

submitBtn.addEventListener('click', tryBeginSession);
nameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    e.stopPropagation();
    tryBeginSession();
  }
});

// ---------- audio ----------
const AU = { ctx:null, muted: store.get('mute', false), musicTimer:null, step:0, boss:false };
function auInit(){
  if(AU.ctx) return;
  try{ AU.ctx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
  AU.master = AU.ctx.createGain(); AU.master.gain.value = AU.muted?0:0.5; AU.master.connect(AU.ctx.destination);
  startMusic();
}
function sfx(type){
  if(!AU.ctx || AU.muted) return;
  const t = AU.ctx.currentTime;
  const o = AU.ctx.createOscillator(), g = AU.ctx.createGain();
  o.connect(g); g.connect(AU.master);
  let d = 0.15;
  switch(type){
    case 'swing': o.type='sawtooth'; o.frequency.setValueAtTime(700,t); o.frequency.exponentialRampToValueAtTime(140,t+0.09); g.gain.setValueAtTime(0.12,t); d=0.1; break;
    case 'hit':   o.type='square'; o.frequency.setValueAtTime(190,t); o.frequency.exponentialRampToValueAtTime(60,t+0.12); g.gain.setValueAtTime(0.22,t); d=0.14; break;
    case 'hurt':  o.type='sawtooth'; o.frequency.setValueAtTime(240,t); o.frequency.exponentialRampToValueAtTime(45,t+0.28); g.gain.setValueAtTime(0.3,t); d=0.3; break;
    case 'jump':  o.type='triangle'; o.frequency.setValueAtTime(240,t); o.frequency.exponentialRampToValueAtTime(520,t+0.1); g.gain.setValueAtTime(0.12,t); d=0.12; break;
    case 'wing':  o.type='triangle'; o.frequency.setValueAtTime(340,t); o.frequency.exponentialRampToValueAtTime(760,t+0.12); g.gain.setValueAtTime(0.12,t); d=0.13; break;
    case 'roll':  o.type='triangle'; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(90,t+0.15); g.gain.setValueAtTime(0.1,t); d=0.16; break;
    case 'coin':  o.type='square'; o.frequency.setValueAtTime(880,t); o.frequency.setValueAtTime(1320,t+0.07); g.gain.setValueAtTime(0.09,t); d=0.16; break;
    case 'ember': o.type='sine'; o.frequency.setValueAtTime(660,t); o.frequency.exponentialRampToValueAtTime(1200,t+0.1); g.gain.setValueAtTime(0.08,t); d=0.14; break;
    case 'flask': o.type='sine'; o.frequency.setValueAtTime(320,t); o.frequency.exponentialRampToValueAtTime(640,t+0.35); g.gain.setValueAtTime(0.14,t); d=0.4; break;
    case 'bonfire':o.type='sine'; o.frequency.setValueAtTime(196,t); o.frequency.setValueAtTime(262,t+0.18); o.frequency.setValueAtTime(392,t+0.36); g.gain.setValueAtTime(0.16,t); d=0.7; break;
    case 'roar':  o.type='sawtooth'; o.frequency.setValueAtTime(90,t); o.frequency.exponentialRampToValueAtTime(38,t+0.7); g.gain.setValueAtTime(0.32,t); d=0.8; break;
    case 'die':   o.type='sawtooth'; o.frequency.setValueAtTime(160,t); o.frequency.exponentialRampToValueAtTime(30,t+1.1); g.gain.setValueAtTime(0.3,t); d=1.2; break;
    case 'felled':o.type='sine'; o.frequency.setValueAtTime(523,t); o.frequency.setValueAtTime(659,t+0.2); o.frequency.setValueAtTime(784,t+0.4); g.gain.setValueAtTime(0.16,t); d=0.9; break;
    case 'ui':    o.type='square'; o.frequency.setValueAtTime(520,t); g.gain.setValueAtTime(0.06,t); d=0.06; break;
    case 'shoot': o.type='sawtooth'; o.frequency.setValueAtTime(420,t); o.frequency.exponentialRampToValueAtTime(180,t+0.12); g.gain.setValueAtTime(0.09,t); d=0.13; break;
  }
  g.gain.exponentialRampToValueAtTime(0.0001, t+d);
  o.start(t); o.stop(t+d+0.02);
}
const SCALE = [73.42, 87.31, 110, 146.83, 174.61, 220, 293.66, 349.23];
function startMusic(){
  if(AU.musicTimer || !AU.ctx) return;
  AU.musicTimer = setInterval(()=>{
    if(!AU.ctx || AU.muted) return;
    const t = AU.ctx.currentTime, s = AU.step++;
    const speed = AU.boss? 2:1;
    if(s % (2/speed|0||1) === 0){
      const seq = AU.boss? [0,3,5,7,6,4,3,1] : [0,2,3,5,3,2,1,2];
      const f = SCALE[seq[(s/(AU.boss?1:2)|0)%8]] * (AU.boss?2:1);
      const o = AU.ctx.createOscillator(), g = AU.ctx.createGain();
      o.type='triangle'; o.frequency.value = f*2;
      g.gain.setValueAtTime(0.045,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.9);
      o.connect(g); g.connect(AU.master); o.start(t); o.stop(t+1);
    }
    if(s % 8 === 0){
      const o = AU.ctx.createOscillator(), g = AU.ctx.createGain();
      o.type='sawtooth'; o.frequency.value = SCALE[0]/2;
      g.gain.setValueAtTime(0.05,t); g.gain.exponentialRampToValueAtTime(0.0001,t+3.4);
      o.connect(g); g.connect(AU.master); o.start(t); o.stop(t+3.5);
    }
  }, 250);
}

// ---------- input ----------
const keys = {};
const pressed = {};
window.addEventListener('keydown', e=>{
  if (document.activeElement === nameInput) return; // Prevent controlling game while typing name
  auInit();
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  if(!keys[e.code]) pressed[e.code] = true;
  keys[e.code] = true;
  if(e.code==='KeyM'){ AU.muted=!AU.muted; store.set('mute',AU.muted); if(AU.master) AU.master.gain.value = AU.muted?0:0.5; }
});
window.addEventListener('keyup', e=>{ keys[e.code]=false; });
function tap(code){ if(pressed[code]){ pressed[code]=false; return true; } return false; }
const mouse = {x:0,y:0,click:false};
cv.addEventListener('mousemove', e=>{
  const r = cv.getBoundingClientRect();
  mouse.x = (e.clientX-r.left)*(W/r.width); mouse.y = (e.clientY-r.top)*(H/r.height);
});
cv.addEventListener('mousedown', ()=>{ auInit(); mouse.click = true; });

  clear:'"The world was all before them, where to choose\ntheir place of rest, and Providence their guide."',
  pal:{sky1:'#140a04',sky2:'#663a0a',ground:'#2e1c0c',plat:'#452c14',accent:'#ffb32e',glow:'#ffd98a',far:'#241404'},
  weather:'embers', hazard:'lava', grav:1, len:6800, enemies:['grunt','caster','flyer'], density:1.3, skin:'angel',
  boss:{arch:'blade', name:'THE SWORD OF EDEN', hp:820, dmg:34} },
];

const TAUNTS = ['Better to reign!','The unconquerable will!','Immortal hate!','Courage never to submit!','What matter where, if I be still the same?','Study of revenge!','Awake, arise!'];
const LOOT_LINES = ['Ha! Riches of Heaven!','Mammon would approve.','Barbaric pearl and gold!','Treasure of the fallen!','Gems of Heaven\'s pavement!'];

// ---------- game globals ----------
const GRAV=2100, SPEED=330, JUMPV=740, DJUMPV=640, ROLLV=560;
const G = {
  state:'title', ch:null, lv:null, t:0, shake:0, sel:0,
  cam:{x:0,y:0}, banners:[], popups:[], parts:[], projs:[],
  embers: store.get('embers', 0),
  upg: store.get('upg', 0),
  completed: new Set(store.get('done', [])),
  drop: store.get('drop', null),
  deadT:0, clearT:0, introT:0, flash:0, paused:false,
};
let P = null;

function banner(text, sub, color, dur){ G.banners.push({text, sub:sub||'', color:color||'#e8d5a0', t:0, dur:dur||2.6}); }
function popup(text, x, y, color){ G.popups.push({text, x, y, t:0, color:color||'#e8d5a0'}); }
function spawnParts(x, y, n, color, spd, up){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2;
    G.parts.push({x, y, vx:Math.cos(a)*spd*(0.3+Math.random()), vy:Math.sin(a)*spd*(0.3+Math.random()) - (up||0), life:0.4+Math.random()*0.5, t:0, r:1.5+Math.random()*2.5, color});
  }
}

// ---------- player ----------
function newPlayer(x, y){
  return {
    x, y, w:24, h:42, vx:0, vy:0, face:1, onGround:false, jumps:0,
    maxHp: 100 + G.upg*12, hp: 100 + G.upg*12,
    stMax:100, st:100, stDelay:0,
    flasks:3, flaskMax:3,
    rollT:0, rollCD:0, atkT:0, atkCD:0, swing:0, healT:0,
    iT:0, dead:false, runT:0, wingT:0,
    lastGround:{x, y},
  };
}
function playerDmg(){ return 26 + G.upg*3; }

// ---------- level generation ----------
function makeEnemy(type, x, fy, minX, maxX, ch){
  const n = ch.n;
  const base = {
    grunt: {w:26,h:34, hp:36+n*7, dmg:12+n, spd:55+n*3},
    caster:{w:24,h:36, hp:28+n*6, dmg:11+n, spd:0},
    flyer: {w:28,h:20, hp:24+n*5, dmg:10+n, spd:90+n*4},
  }[type];
  return { type, x, y: type==='flyer'? fy-150 : fy-base.h, w:base.w, h:base.h,
    hp:base.hp, maxhp:base.hp, dmg:base.dmg, spd:base.spd,
    dir: Math.random()<0.5?-1:1, minX, maxX, fy,
    homeX:x, baseY:fy-150, t:Math.random()*6, cd:1+Math.random()*1.5,
    dead:false, flash:0, hitSwing:-1, skin:ch.skin };
}

function makeBoss(ch, arena) {
  const b = ch.boss;
  return {
    arch: b.arch, name: b.name, maxhp: b.hp, hp: b.hp, dmg: b.dmg,
    spawnX: arena.x1 + 600, spawnY: arena.y - 70, x: arena.x1 + 600, y: arena.y - 70,
    w: 52, h: 70, active: false, dead: false, flash: 0, hitSwing: -1,
    state: 'idle', t: 0, dir: -1
  };
}

function genLevel(ch){
  const R = mulberry32(ch.n*7919+13);
  const L = { floors:[], plats:[], enemies:[], spawnDefs:[], treasures:[], beacons:[],
    length:0, killY:640, hazard:ch.hazard, pal:ch.pal, ch,
    bossStarted:false, exit:null, arena:null, boss:null };
  let x = 0, y = 440;
  L.floors.push({x:0, w:700, y:440});
  x = 700;
  const arenaW = 980;
  while(x < ch.len - arenaW - 300){
    if(R() < 0.55) x += 110 + R()*130;
    y = clamp(y + (R()*160 - 80), 370, 480);
    const w = 320 + R()*420;
    L.floors.push({x, w, y});
    if(R() < 0.75){
      const pw = 90 + R()*110;
      const px = x + 40 + R()*Math.max(10, w - pw - 80);
      const py = y - (95 + R()*70);
      L.plats.push({x:px, y:py, w:pw});
      if(R() < 0.7){
        const k = R() < 0.16 ? 'flask' : (R() < 0.5 ? 'chalice' : 'gem');
        L.treasures.push({x:px+pw/2-10, y:py-26, w:20, h:20, taken:false, kind:k});
      }
    }
    const cnt = Math.floor(R()*2*ch.density + ch.density*0.75);
    for(let i=0;i<cnt;i++){
      const type = ch.enemies[Math.floor(R()*ch.enemies.length)];
      const ex = x + 60 + R()*Math.max(20, w-120);
      L.spawnDefs.push({type, x:ex, fy:y, minX:x+8, maxX:x+w-8});
    }
    if(R() < 0.4) L.treasures.push({x:x+w-56, y:y-26, w:20, h:20, taken:false, kind: R()<0.5?'chalice':'gem'});
    x += w;
  }
  x += 130;
  L.arena = {x1:x, x2:x+arenaW, y:440};
  L.floors.push({x, w:arenaW, y:440});
  L.exit = {x:x+arenaW-100, y:440-84, w:56, h:84, open:false};
  L.length = x + arenaW;
  
  L.beacons.push({x:150, y:440, lit:true});
  for(const frac of [0.42, 0.72]){
    const tx = L.length*frac;
    let best = L.floors[0], bd = 1e9;
    for(const f of L.floors){
      if(f === L.floors[L.floors.length-1]) continue;
      const cx = f.x + f.w/2, d = Math.abs(cx - tx);
      if(d < bd){ bd = d; best = f; }
    }
    L.beacons.push({x:best.x + best.w/2, y:best.y, lit:false});
  }
  rebuildEnemies(L);
  L.boss = makeBoss(ch, L.arena);
  return L;
}
function rebuildEnemies(L){
  L.enemies = L.spawnDefs.map(d => makeEnemy(d.type, d.x, d.fy, d.minX, d.maxX, L.ch));
}

// ---------- level entry / respawn ----------
function startChapter(ch){
  Analytics.chapterStarted(ch.n);
  G.ch = ch;
  G.lv = genLevel(ch);
  G.spawn = {x:150, y:440-42};
  P = newPlayer(G.spawn.x, G.spawn.y);
  G.projs = []; G.parts = []; G.popups = []; G.banners = [];
  G.cam.x = 0; G.cam.y = 0;
  if(G.drop && G.drop.ch !== ch.n) {}
  G.state = 'intro'; G.introT = 0;
  AU.boss = false;
}
function respawn(){
  P = newPlayer(G.spawn.x, G.spawn.y);
  P.maxHp = 100 + G.upg*12; P.hp = P.maxHp;
  rebuildEnemies(G.lv);
  G.projs = [];
  const b = G.lv.boss;
  if(b && !b.dead){ b.hp = b.maxhp; b.active = false; b.x = b.spawnX; b.y = b.spawnY; b.state='idle'; b.t=0; }
  G.lv.bossStarted = false;
  AU.boss = false;
  G.state = 'play';
}

// ---------- player update ----------
function updatePlayer(dt){
  const L = G.lv;
  const rolling = P.rollT > 0;
  P.iT -= dt; P.rollCD -= dt; P.atkCD -= dt; P.stDelay -= dt; P.wingT -= dt;
  if(P.atkT > 0) P.atkT -= dt;
  if(P.healT > 0) P.healT -= dt;
  if(P.stDelay <= 0 && !rolling) P.st = Math.min(P.stMax, P.st + 58*dt);

  let mx = 0;
  if(keys['KeyA']||keys['ArrowLeft'])  mx -= 1;
  if(keys['KeyD']||keys['ArrowRight']) mx += 1;

  if(rolling){
    P.rollT -= dt;
    P.vx = P.face * ROLLV;
  } else {
    const slow = P.healT > 0 ? 0.35 : 1;
    P.vx = mx * SPEED * slow;
    if(mx !== 0) P.face = mx;
  }

  if(tap('Space')||tap('KeyW')||tap('ArrowUp')){
    if(P.onGround){ Analytics.event('jumps'); P.vy = -JUMPV*Math.sqrt(G.ch.grav); P.onGround=false; P.jumps=1; sfx('jump'); }
    else if(P.jumps < 2){ Analytics.event('jumps'); P.vy = -DJUMPV*Math.sqrt(G.ch.grav); P.jumps=2; P.wingT=0.3; sfx('wing');
      spawnParts(P.x+P.w/2, P.y+P.h, 8, G.ch.pal.glow, 90, 40); }
  }
  if((tap('KeyK')||tap('KeyX')||tap('ShiftLeft')||tap('ShiftRight')) && !rolling && P.rollCD<=0 && P.st>=25){
    Analytics.event('rolls'); P.rollT = 0.34; P.rollCD = 0.5; P.st -= 25; P.stDelay = 0.45; sfx('roll');
  }
  if((tap('KeyJ')||tap('KeyZ')) && P.atkCD<=0 && !rolling && P.st>=18){
    Analytics.event('attacks'); P.atkT = 0.16; P.atkCD = 0.4; P.st -= 18; P.stDelay = 0.45; P.swing++; sfx('swing');
  }
  if((tap('KeyL')||tap('KeyC')) && P.flasks>0 && P.healT<=0 && P.hp < P.maxHp){
    Analytics.event('heals'); P.flasks--; P.healT = 0.6; sfx('flask');
    P.hp = Math.min(P.maxHp, P.hp + Math.ceil(P.maxHp*0.45));
    spawnParts(P.x+P.w/2, P.y+P.h/2, 14, '#ffb347', 70, 60);
  }

  P.vy += GRAV * G.ch.grav * dt;
  P.vy = Math.min(P.vy, 1100);
  const prevY = P.y;
  P.x += P.vx * dt;
  P.y += P.vy * dt;
  P.x = clamp(P.x, 0, L.length - P.w);
  if(L.bossStarted && L.boss && !L.boss.dead)
    P.x = clamp(P.x, L.arena.x1+6, L.arena.x2-P.w-6);

  P.onGround = false;
  if(P.vy >= 0){
    const feetPrev = prevY + P.h, feet = P.y + P.h;
    const surfaces = L.floors.concat(L.plats);
    for(const s of surfaces){
      if(P.x + P.w > s.x && P.x < s.x + s.w && feetPrev <= s.y + 8 && feet >= s.y){
        P.y = s.y - P.h; P.vy = 0; P.onGround = true; P.jumps = 0;
        break;
      }
    }
  }
  if(P.onGround){ P.lastGround.x = P.x; P.lastGround.y = P.y; P.runT += Math.abs(P.vx)*dt; }

  if(P.y > L.killY){ killPlayer(); return; }

  if(P.atkT > 0){
    const hb = {x: P.face>0 ? P.x+P.w-6 : P.x-48, y: P.y+2, w:54, h:40};
    for(const e of L.enemies){
      if(e.dead || e.hitSwing===P.swing) continue;
      if(rectHit(hb, e)){
        e.hitSwing = P.swing; e.hp -= playerDmg(); e.flash = 0.12;
        e.x += P.face*12; sfx('hit'); G.shake = Math.max(G.shake, 4);
        spawnParts(e.x+e.w/2, e.y+e.h/2, 8, '#ff5a4d', 120);
        if(e.hp <= 0){
          e.dead = true; Analytics.event('kills');
          const gain = 10 + G.ch.n*4 + (e.type==='caster'?6:0);
          G.embers += gain; sfx('ember');
          spawnParts(e.x+e.w/2, e.y+e.h/2, 16, G.ch.pal.glow, 140, 60);
          popup('+'+gain, e.x+e.w/2, e.y-10, '#9adcff');
          if(Math.random() < 0.25) popup('"'+TAUNTS[Math.floor(Math.random()*TAUNTS.length)]+'"', P.x+P.w/2, P.y-24, '#e8d5a0');
        }
      }
    }
    const b = L.boss;
    if(b && b.active && !b.dead && b.hitSwing !== P.swing && rectHit(hb, b)){
      b.hitSwing = P.swing; b.hp -= playerDmg(); b.flash = 0.12;
      sfx('hit'); G.shake = Math.max(G.shake, 5);
      spawnParts(b.x+b.w/2, b.y+b.h/2, 10, '#ff5a4d', 130);
      if(b.hp <= 0) fellBoss(b);
    }
  }

  if(P.iT <= 0 && !(rolling && P.rollT < 0.3)){
    for(const e of L.enemies){
      if(!e.dead && rectHit(e, P)){ damagePlayer(e.dmg, e.x); break; }
    }
    const b = L.boss;
    if(b && b.active && !b.dead && rectHit(b, P)) damagePlayer(Math.ceil(b.dmg*0.7), b.x);
  }

  for(const tr of L.treasures){
    if(tr.taken) continue;
    if(rectHit(tr, P)){
      tr.taken = true; Analytics.event('relics');
      if(tr.kind === 'flask'){
        P.flasks = Math.min(P.flaskMax, P.flasks+1);
        popup('Vial of Wrath +1', tr.x, tr.y-12, '#ffb347'); sfx('flask');
      } else {
        const v = tr.kind === 'chalice' ? 30 : 15;
        G.embers += v; sfx('coin');
        popup('+'+v, tr.x, tr.y-12, '#ffd700');
        if(Math.random() < 0.3) popup('"'+LOOT_LINES[Math.floor(Math.random()*LOOT_LINES.length)]+'"', P.x+P.w/2, P.y-24, '#ffd700');
      }
      spawnParts(tr.x+10, tr.y+10, 10, '#ffd700', 90, 50);
    }
  }

  if(G.drop && G.drop.ch === G.ch.n){
    const d = {x:G.drop.x-12, y:G.drop.y-12, w:24, h:24};
    if(rectHit(d, P)){
      G.embers += G.drop.amt; sfx('ember');
      banner('EMBERS RECOVERED', '+'+G.drop.amt, '#9adcff', 1.6);
      G.drop = null; store.set('drop', null);
    }
  }

  G.nearBeacon = null;
  for(const bc of L.beacons){
    if(Math.abs(P.x+P.w/2 - bc.x) < 42 && Math.abs((P.y+P.h) - bc.y) < 60){
      G.nearBeacon = bc;
      if(tap('KeyE')){
        bc.lit = true; Analytics.event('beacons');
        G.spawn = {x:bc.x-P.w/2, y:bc.y-P.h};
        P.hp = P.maxHp; P.flasks = P.flaskMax;
        rebuildEnemies(L); G.projs = [];
        sfx('bonfire');
        banner('BEACON KINDLED', 'the fallen host stirs anew', G.ch.pal.glow, 2.2);
        spawnParts(bc.x, bc.y-30, 24, G.ch.pal.accent, 120, 80);
        saveMeta();
      }
      if(tap('KeyQ')){
        const cost = 120 + G.upg*80;
        if(G.embers >= cost){
          G.embers -= cost; G.upg++;
          P.maxHp += 12; P.hp = Math.min(P.maxHp, P.hp+12);
          sfx('felled'); banner('STRENGTH KINDLED', '+12 max vigor  ·  next: '+(120+G.upg*80)+' embers', '#ffd700', 2.2);
          saveMeta();
        } else {
          popup('Need '+cost+' embers', P.x+P.w/2, P.y-24, '#ff6b6b'); sfx('ui');
        }
      }
    }
  }

  if(!L.bossStarted && P.x > L.arena.x1 + 90){
    L.bossStarted = true; L.boss.active = true;
    AU.boss = true; sfx('roar');
    G.shake = 10;
    banner(L.boss.name, G.ch.sub, '#e8d5a0', 3.2);
  }

  if(L.exit.open && rectHit(L.exit, P)){
    G.completed.add(G.ch.n);
    G.embers += 60;
    Analytics.finishChapter(G.ch.n, G.embers);
    saveMeta();
    G.state = 'clear'; G.clearT = 0;
    sfx('felled');
  }
}

function damagePlayer(dmg, srcX){
  if(P.iT > 0 || P.dead) return;
  P.hp -= dmg; Analytics.event('damageTaken', dmg);
  P.iT = 0.9; P.healT = 0;
  P.vx = (P.x > srcX ? 1 : -1) * 260; P.vy = -220;
  G.shake = Math.max(G.shake, 8);
  sfx('hurt');
  spawnParts(P.x+P.w/2, P.y+P.h/2, 12, '#c02020', 150);
  if(P.hp <= 0) killPlayer();
}
function killPlayer(){
  if(P.dead) return;
  P.dead = true; Analytics.event('deaths');
  if(G.embers > 0){
    G.drop = {ch:G.ch.n, x:P.lastGround.x+P.w/2, y:P.lastGround.y+P.h-10, amt:G.embers};
    G.embers = 0;
  }
  saveMeta();
  G.state = 'dead'; G.deadT = 0;
  AU.boss = false;
  sfx('die');
  G.shake = 12;
}
function fellBoss(b){
  b.dead = true; Analytics.event('bossesDefeated');
  AU.boss = false;
  const gain = 200 + G.ch.n*60;
  G.embers += gain;
  sfx('felled');
  G.shake = 14; G.flash = 0.5;
  banner('GREAT FOE FELLED', '+'+gain+' embers  ·  the way is open', '#ffd700', 3.4);
  spawnParts(b.x+b.w/2, b.y+b.h/2, 50, '#ffd700', 220, 120);
  G.lv.exit.open = true;
  saveMeta();
}
function saveMeta(){
  store.set('embers', G.embers);
  store.set('upg', G.upg);
  store.set('done', [...G.completed]);
  store.set('drop', G.drop);
}

// ---------- enemies ----------
function updateEnemies(dt){
  const L = G.lv;
  for(const e of L.enemies){
    if(e.dead) continue;
    e.flash -= dt; e.t += dt; e.cd -= dt;
    const pcx = P.x+P.w/2, pcy = P.y+P.h/2;
    const ecx = e.x+e.w/2, ecy = e.y+e.h/2;
    const dx = pcx-ecx, dy = pcy-ecy;
    const dist = Math.hypot(dx, dy);
    if(e.type === 'grunt'){
      if(dist < 300 && Math.abs(dy) < 130 && !P.dead){
        e.dir = dx > 0 ? 1 : -1;
        e.x += e.dir * e.spd * 1.7 * dt;
      } else {
        e.x += e.dir * e.spd * dt;
        if(e.x <= e.minX || e.x+e.w >= e.maxX) e.dir *= -1;
      }
    }
  }
}

// ---------- update loop ----------
let lastTime = 0;
function loop(timestamp) {
  if (!lastTime) lastTime = timestamp;
  let dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  if (dt > 0.1) dt = 0.1; // Cap delta to prevent massive leaps

  if (G.state === 'play' && P) {
    updatePlayer(dt);
    updateEnemies(dt);
    
    // Update camera target
    const targetCamX = P.x - W / 2 + P.w / 2;
    G.cam.x = lerp(G.cam.x, targetCamX, 0.1);
    G.cam.x = clamp(G.cam.x, 0, G.lv.length - W);
  }

  draw();
  requestAnimationFrame(loop);
}

// ---------- draw functions ----------
function draw() {
  ctx.clearRect(0, 0, W, H);
  
  if (G.state === 'title') {
    ctx.fillStyle = "#050308";
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#e8d5a0";
    ctx.font = "bold 42px 'Times New Roman'";
    ctx.textAlign = "center";
    ctx.fillText("PARADISE LOST", W/2, H/2 - 40);
    ctx.font = "italic 20px 'Times New Roman'";
    ctx.fillText("A Souls-like Elegy", W/2, H/2 + 10);
  } else if (G.state === 'play' || G.state === 'intro' || G.state === 'dead' || G.state === 'clear') {
    const pal = G.ch ? G.ch.pal : { sky1: '#000', ground: '#333' };
    
    // Background
    ctx.fillStyle = pal.sky1;
    ctx.fillRect(0, 0, W, H);
    
    // Camera translate
    ctx.save();
    ctx.translate(-G.cam.x, -G.cam.y);
    
    // Floors
    ctx.fillStyle = pal.ground;
    for (const f of G.lv.floors) {
      ctx.fillRect(f.x, f.y, f.w, H - f.y);
    }
    // Platforms
    ctx.fillStyle = pal.plat || pal.ground;
    for (const p of G.lv.plats) {
      ctx.fillRect(p.x, p.y, p.w, 15);
    }

    // Beacons
    for (const bc of G.lv.beacons) {
      ctx.fillStyle = bc.lit ? pal.accent : "#555";
      ctx.fillRect(bc.x - 10, bc.y - 30, 20, 30);
    }

    // Treasures
    for (const tr of G.lv.treasures) {
      if (!tr.taken) {
        ctx.fillStyle = tr.kind === 'flask' ? '#ffb347' : '#ffd700';
        ctx.fillRect(tr.x, tr.y, tr.w, tr.h);
      }
    }

    // Player
    if (P && !P.dead) {
      ctx.fillStyle = P.iT > 0 && Math.floor(Date.now() / 50) % 2 === 0 ? "rgba(255,255,255,0.4)" : "#fff";
      ctx.fillRect(P.x, P.y, P.w, P.h);
    }

    // Enemies
    for (const e of G.lv.enemies) {
      if (!e.dead) {
        ctx.fillStyle = e.flash > 0 ? "#ff8888" : pal.accent;
        ctx.fillRect(e.x, e.y, e.w, e.h);
      }
    }

    // Boss
    const b = G.lv.boss;
    if (b && b.active && !b.dead) {
      ctx.fillStyle = b.flash > 0 ? "#ff8888" : pal.glow;
      ctx.fillRect(b.x, b.y, b.w, b.h);
    }

    ctx.restore();
  }
}

// Start core loop
requestAnimationFrame(loop);
</script>
